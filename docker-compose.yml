services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: virtuallibrary
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - virtuallibrary-pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d virtuallibrary"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: VirtualLibrary.Api/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=virtuallibrary;Username=postgres;Password=postgres"
      Jwt__Key: "DevSecret_ChangeMe_32CharsMin!!!!"
      Jwt__Issuer: "VirtualLibrary"
      Jwt__Audience: "VirtualLibrary"
      AllowedOrigins: "http://localhost:8080"
    ports:
      - "5179:8080"

volumes:
  virtuallibrary-pgdata:
